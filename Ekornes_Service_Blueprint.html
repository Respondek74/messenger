function Cell(props) {
  var items = props.items;
  var color = props.color;
  var isHighlighted = props.isHighlighted;
  return h('div', {
    style: {
      width: COL_W + 'px',
      minWidth: COL_W + 'px',
      padding: '12px 14px',
      display: 'flex',
      flexDirection: 'column',
      gap: '6px',
      opacity: isHighlighted ? 1 : 0.45,
      transition: 'opacity 0.3s ease',
      borderRight: '1px solid #E8E4DF'
    }
  },
    items.map(function(item, j) {
      return h('div', {
        key: j,
        style: {
          fontSize: '11px',
          lineHeight: 1.4,
          padding: '6px 10px',
          background: color + '12',
          border: '1px solid ' + color + '25',
          borderRadius: '6px',
          color: '#555',
          whiteSpace: 'pre-line'
        }
      }, item);
    })
  );
}

function LineSeparator(props) {
  return h('div', {
    style: {
      display: 'flex',
      alignItems: 'center',
      minHeight: '32px',
      position: 'relative'

          background: 'repeating-linear-gradient(90deg, ' + props.color + ' 0, ' + props.color + ' 8px, transparent 8px, transparent 16px)',

        style: {

function App() {
  var ref = useState(-1);
  var hoverCol = ref[0];

  var totalW = LABEL_W + (COL_W + GAP) * 7 + 40;

  function renderRow(layer, rowIndex) {
    if (layer.items === null) {
      return h(LineSeparator, { key: layer.id, color: layer.accent, label: layer.desc });
    }
    return h('div', {
      key: layer.id,
      style: {
        display: 'flex',
        alignItems: 'stretch',
        background: layer.bg,
        borderBottom: '1px solid #E8E4DF',
        minWidth: totalW + 'px'
      }
    },
      // Label
      h('div', {
        style: {
          width: LABEL_W + 'px',
          minWidth: LABEL_W + 'px',
          padding: '16px 16px 16px 24px',
          display: 'flex',
          flexDirection: 'column',
          justifyContent: 'center',
          borderRight: '1px solid #E8E4DF',
          position: 'sticky',
          left: 0,
          background: layer.bg === 'none' ? '#FAF8F5' : layer.bg,
          zIndex: 2
        }
      },
        h('div', {
          style: {
            fontSize: '12px',
            fontWeight: 600,
            color: layer.accent,
            letterSpacing: '0.5px',
            marginBottom: '2px'
          }
        }, layer.label),
        h('div', {
          style: {
            fontSize: '9px',
            color: '#999',
            letterSpacing: '0.3px'
          }
        }, layer.desc)
      ),
      // Cells
      layer.items.map(function(cellItems, colIdx) {
        return h('div', {
          key: colIdx,
          onMouseEnter: function() { setHoverCol(colIdx); },
          onMouseLeave: function() { setHoverCol(-1); },
          style: { display: 'flex' }
        },
          h(Cell, {
            items: cellItems,
            color: colors[colIdx],
            isHighlighted: hoverCol === -1 || hoverCol === colIdx
          })
        );
      })
    );
  }

  function renderActors() {
