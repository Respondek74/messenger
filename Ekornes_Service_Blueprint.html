function Cell(props) {
  var items = props.items;
  var color = props.color;
  var isHighlighted = props.isHighlighted;
  return h('div', {
    style: {
      width: COL_W + 'px',
      minWidth: COL_W + 'px',
      padding: '12px 14px',
      display: 'flex',
      flexDirection: 'column',
      gap: '6px',
      opacity: isHighlighted ? 1 : 0.45,
      transition: 'opacity 0.3s ease',
      borderRight: '1px solid rgba(255,255,255,0.04)'
    }
  },
    items.map(function(item, j) {
      return h('div', {
        key: j,
        style: {
          fontSize: '11px',
          lineHeight: 1.4,
          padding: '6px 10px',
          background: color + '15',
          border: '1px solid ' + color + '25',
          borderRadius: '6px',
          color: '#CCC',
          whiteSpace: 'pre-line'
        }
      }, item);
    })
  );
}

function LineSeparator(props) {
  return h('div', {
    style: {

      alignItems: 'center',
      minHeight: '32px',
      position: 'relative'

        padding: '0 16px'

          height: '2px',
          background: 'repeating-linear-gradient(90deg, ' + props.color + ' 0, ' + props.color + ' 8px, transparent 8px, transparent 16px)',
          opacity: 0.6
        }
      }),

        style: {
